# FireBoard "session active" inference
#
# Paste into configuration.yaml, then Developer Tools > YAML > Restart (or
# restart Home Assistant). Update the entity list below if you add/remove
# channels or rename your FireBoard sensors.

template:
  - binary_sensor:
      - name: "FireBoard Session Active"
        unique_id: fireboard_session_active
        icon: >
          {% if this.state == 'on' %}
            mdi:fire
          {% else %}
            mdi:fire-off
          {% endif %}
        state: >
          {% set channels = [
            'sensor.fireboard1_channel1',
            'sensor.fireboard1_channel2',
            'sensor.fireboard1_channel3',
            'sensor.fireboard1_channel4',
            'sensor.fireboard1_channel5',
            'sensor.fireboard1_channel6'
          ] %}
          {% set active = channels
              | map('states')
              | select('is_number')
              | map('float')
              | select('ne', 0)
              | list %}
          {{ active | count > 0 }}
